apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: grafana
spec:
  interval: 1h0s
  timeout: 10m0s
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: grafana
      version: "8.x.x"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 1h0s
  values:
    adminUser: admin
    adminPassword: admin123
    initChownData:
      enabled: false
    securityContext:
      runAsNonRoot: false
      runAsUser: 0
    service:
      type: NodePort
      nodePort: 30300
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: VictoriaMetrics
            type: prometheus
            url: http://victoria-metrics-victoria-metrics-single-server.victoria-metrics.svc.cluster.local:8428
            access: proxy
            isDefault: true
    grafana.ini:
      server:
        root_url: http://localhost:30300
      security:
        allow_embedding: true
