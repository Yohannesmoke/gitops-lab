apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: grafana
spec:
  interval: 1h0s
  chart:
    spec:
      chart: grafana
      version: "8.x.x"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 1h0s
  values:
    adminUser: admin
    adminPassword: admin123
    plugins:
      - victoriametrics-logs-datasource
    initChownData:
      enabled: false
    securityContext:
      runAsNonRoot: false
      runAsUser: 0
    service:
      type: NodePort
      nodePort: 30300
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: VictoriaMetrics
            type: prometheus
            url: http://victoria-metrics-victoria-metrics-single-server.victoria-metrics.svc.cluster.local:8428
            access: proxy
            isDefault: true
          - name: VictoriaLogs
            type: victoriametrics-logs-datasource
            url: http://victoria-logs-victoria-logs-single-server.victoria-logs.svc.cluster.local:9428
            access: proxy
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: default
            orgId: 1
            folder: "Lab Dashboards"
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/default

    dashboards:
      default:
        kubernetes-cluster:
          gnetId: 7249
          revision: 1
          datasource: VictoriaMetrics
        victoriametrics-single:
          gnetId: 10229
          revision: 8
          datasource: VictoriaMetrics
        node-exporter-full:
          gnetId: 1860
          revision: 37
          datasource: VictoriaMetrics

    grafana.ini:
      server:
        root_url: http://localhost:30300
      security:
        allow_embedding: true
