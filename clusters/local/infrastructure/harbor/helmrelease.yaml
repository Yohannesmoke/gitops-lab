apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
  namespace: harbor
spec:
  interval: 1h0s
  timeout: 10m0s
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: harbor
      version: "1.16.x"
      sourceRef:
        kind: HelmRepository
        name: harbor
        namespace: flux-system
      interval: 1h0s
  values:
    expose:
      type: nodePort
      tls:
        enabled: false
      nodePort:
        ports:
          http:
            nodePort: 30080
    externalURL: http://localhost:30080
    harborAdminPassword: Harbor12345
    persistence:
      enabled: true
      resourcePolicy: keep
      persistentVolumeClaim:
        registry:
          size: 10Gi
        database:
          size: 2Gi
        redis:
          size: 1Gi
    metrics:
      enabled: true
