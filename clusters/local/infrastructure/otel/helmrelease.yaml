apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-collector
  namespace: otel
spec:
  interval: 1h0s
  chart:
    spec:
      chart: opentelemetry-collector
      version: "0.x.x"
      sourceRef:
        kind: HelmRepository
        name: opentelemetry
        namespace: flux-system
      interval: 1h0s
  values:
    mode: deployment
    replicaCount: 1
    image:
      repository: otel/opentelemetry-collector-contrib
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
    config:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
        prometheus:
          config:
            scrape_configs:
              - job_name: otel-collector
                scrape_interval: 30s
                static_configs:
                  - targets: ["localhost:8888"]
      processors:
        batch:
          timeout: 5s
          send_batch_size: 1000
        memory_limiter:
          check_interval: 1s
          limit_mib: 200
      exporters:
        prometheusremotewrite:
          endpoint: http://victoria-metrics-victoria-metrics-single-server.victoria-metrics.svc.cluster.local:8428/api/v1/write
        otlphttp/logs:
          endpoint: http://victoria-logs-victoria-logs-single-server.victoria-logs.svc.cluster.local:9428/insert/opentelemetry
        debug:
          verbosity: basic
      service:
        pipelines:
          metrics:
            receivers: [otlp, prometheus]
            processors: [memory_limiter, batch]
            exporters: [prometheusremotewrite]
          logs:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [otlphttp/logs]
          traces:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [debug]
